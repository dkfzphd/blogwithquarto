  <!-- Main Content -->
  <main class="container" style="padding-top: 7rem;">

      <span class="section-tag">BLOG</span>
      <h2 class="section-title">Academic & Tech Blog</h2>
      <p class="section-desc">Documenting tutorials, insights, and research logs in molecular oncology, data programming, and research toolkits.</p>
    </div>

    <!-- Search Input -->
    <div class="blog-search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" class="blog-search-input" id="blog-search" placeholder="Search by title, categories, or keywords...">
    </div>

    <!-- Dynamic Category Filter Chips -->
    <div class="projects-filter" id="blog-categories-filter">
      <button class="filter-btn active" data-category="all">All</button>
    </div>

    <!-- Blog Card Grid -->
    <div class="posts-grid" id="blog-posts-grid">
      <div style="grid-column: 1/-1; text-align: center; color: var(--text-muted);">

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const postsGrid = document.getElementById('blog-posts-grid');
      const searchInput = document.getElementById('blog-search');
      const categoriesFilter = document.getElementById('blog-categories-filter');
      
      if (!postsGrid || !searchInput || !categoriesFilter) return;

      const posts = await fetchPosts();
      if (!posts || posts.length === 0) {
        postsGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:var(--text-muted); padding:3rem 0;">No articles published yet.</div>';
        return;
      }

      // Compile unique categories set
      const categoriesSet = new Set();
      posts.forEach(post => {
        (post.categories || []).forEach(cat => {
          if (cat) categoriesSet.add(cat);
        });
      });

      // Insert category filter chips
      categoriesSet.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.setAttribute('data-category', cat);
        btn.textContent = cat;
        categoriesFilter.appendChild(btn);
      });

      let activeCategory = 'all';
      let searchQuery = '';

      // Check URL query parameters
      const urlParams = new URLSearchParams(window.location.search);
      const urlCategory = urlParams.get('category');
      if (urlCategory && (categoriesSet.has(urlCategory) || urlCategory.toLowerCase() === 'all')) {
        activeCategory = urlCategory;
        const filterButtons = categoriesFilter.querySelectorAll('.filter-btn');
        filterButtons.forEach(btn => {
          if (btn.getAttribute('data-category') === urlCategory) {
            btn.classList.add('active');
          } else {
            btn.classList.remove('active');
          }
        });
      }

      // Core render function
      function renderFilteredPosts() {
        const filtered = posts.filter(post => {
          const matchesCategory = activeCategory === 'all' || (post.categories || []).includes(activeCategory);
          const normalizedQuery = searchQuery.toLowerCase().trim();
          const matchesSearch = !normalizedQuery || 
            post.title.toLowerCase().includes(normalizedQuery) ||
            (post.description || '').toLowerCase().includes(normalizedQuery) ||
            (post.categories || []).some(cat => cat.toLowerCase().includes(normalizedQuery));

          return matchesCategory && matchesSearch;
        });

        postsGrid.innerHTML = '';
        if (filtered.length === 0) {
          postsGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:var(--text-muted); padding:3rem 0;">No articles match your search parameters.</div>';
          return;
        }

        filtered.forEach(post => {
          const card = document.createElement('article');
          card.className = 'card blog-card';

          const categoriesHtml = (post.categories || [])
            .map(cat => `<span class="blog-category-tag" style="cursor:pointer;" onclick="selectCategoryDirectly('${cat}')">${cat}</span>`)
            .join('');

          const coverImg = post.image
            ? `<div class="blog-card-image"><img src="${post.image}" alt="${post.title}" loading="lazy"></div>`
            : `<div class="blog-card-image" style="background: var(--gradient-accent); opacity: 0.85;"></div>`;

          const displayDate = formatDate(post.date);
          const desc = post.description || 'Click to read the full post and explore details.';

          card.innerHTML = `
            ${coverImg}
            <div class="blog-card-content">
              <div class="blog-card-categories">${categoriesHtml}</div>
              <div class="blog-card-meta">
                <span>${displayDate}</span>
                <span>•</span>
                <span>By ${post.author || 'Te'}</span>
              </div>
              <h3 class="blog-card-title">
                <a href="post.html?id=${post.id}">${post.title}</a>
              </h3>
              <p class="blog-card-desc">${desc}</p>
              <a href="post.html?id=${post.id}" class="blog-card-readmore">
                Read Article &rarr;
              </a>
            </div>
          `;
          postsGrid.appendChild(card);
        });
      }

      // External helper: click post category tag directly to trigger chip toggle
      window.selectCategoryDirectly = (cat) => {
        activeCategory = cat;
        const filterButtons = categoriesFilter.querySelectorAll('.filter-btn');
        filterButtons.forEach(btn => {
          if (btn.getAttribute('data-category') === cat) {
            btn.classList.add('active');
          } else {
            btn.classList.remove('active');
          }
        });
        const newUrl = new URL(window.location);
        newUrl.searchParams.set('category', cat);
        window.history.pushState({}, '', newUrl);

        renderFilteredPosts();
        window.scrollTo({ top: categoriesFilter.offsetTop - 100, behavior: 'smooth' });
      };

      // Filter button click event
      categoriesFilter.addEventListener('click', (e) => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;

        categoriesFilter.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        activeCategory = btn.getAttribute('data-category');
        
        const newUrl = new URL(window.location);
        if (activeCategory === 'all') {
          newUrl.searchParams.delete('category');
        } else {
          newUrl.searchParams.set('category', activeCategory);
        }
        window.history.pushState({}, '', newUrl);

        renderFilteredPosts();
      });

      // Realtime text search inputs debounce
      let searchTimeout;
      searchInput.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          searchQuery = e.target.value;
          renderFilteredPosts();
        }, 150);
      });

      renderFilteredPosts();
    });
  </script>
